<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#050816"/><stop offset="100%" stop-color="#0B1026"/></linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#00E5FF"/><stop offset="100%" stop-color="#FF2E88"/></linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="60%"><stop offset="0%" stop-color="#00E5FF" stop-opacity="0.24"/><stop offset="100%" stop-color="#050816" stop-opacity="0"/></radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/><feFlood flood-color="#7C3AED" flood-opacity="0.38" result="glowColor"/><feComposite in="glowColor" in2="blur" operator="in" result="glow"/><feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow" x="-15%" y="-15%" width="135%" height="135%"><feGaussianBlur in="SourceAlpha" stdDeviation="10"/><feOffset dx="0" dy="7" result="offsetBlur"/><feFlood flood-color="#000000" flood-opacity="0.18" result="shadowColor"/><feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/><feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g id="background"><rect width="1280" height="720" fill="url(#bg)"/><circle cx="640" cy="360" r="420" fill="url(#halo)"/><path d="M80 608H1200" stroke="#20325F" stroke-width="1"/></g>
  <g id="title">
    <text x="80" y="94" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" letter-spacing="3" fill="#00E5FF">MOTION PROOF</text>
    <text x="80" y="148" font-family="Microsoft YaHei, Arial, sans-serif" font-size="44" font-weight="700" fill="#EAF2FF">动态图片 + 对象级入场动画</text>
    <text x="80" y="186" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#8DA2C0">本页用于验证 GIF 媒体、semantic group anchors 与 PowerPoint Animation Pane。</text>
  </g>
  <g id="hero-motion-card" filter="url(#shadow)">
    <rect x="82" y="238" width="500" height="310" rx="34" fill="#101A3F" stroke="#20325F"/>
    <image href="../images/dynamic_ai_orbit.gif" x="106" y="262" width="452" height="244" preserveAspectRatio="xMidYMid slice"/>
    <rect x="106" y="262" width="452" height="244" rx="24" fill="none" stroke="#00E5FF" stroke-width="1.3" stroke-opacity="0.55"/>
    <text x="124" y="534" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#8DA2C0">dynamic_ai_orbit.gif · 24 frames · animated visual</text>
  </g>
  <g id="metric-animation" filter="url(#glow)">
    <rect x="640" y="246" width="236" height="132" rx="26" fill="#101A3F" stroke="#20325F"/>
    <text x="674" y="300" font-family="Microsoft YaHei, Arial, sans-serif" font-size="46" font-weight="700" fill="#00E5FF">-a auto</text>
    <text x="674" y="338" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" fill="#8DA2C0">semantic groups 自动映射效果</text>
  </g>
  <g id="metric-transition" filter="url(#glow)">
    <rect x="912" y="246" width="236" height="132" rx="26" fill="#101A3F" stroke="#20325F"/>
    <text x="946" y="300" font-family="Microsoft YaHei, Arial, sans-serif" font-size="46" font-weight="700" fill="#7C3AED">push</text>
    <text x="946" y="338" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" fill="#8DA2C0">页面转场 0.6 秒</text>
  </g>
  <g id="motion-timeline">
    <rect x="640" y="438" width="508" height="94" rx="28" fill="#050816" stroke="#20325F"/>
    <rect x="682" y="482" width="392" height="10" rx="5" fill="#20325F"/>
    <rect x="682" y="482" width="255" height="10" rx="5" fill="url(#barGrad)"/>
    <circle cx="682" cy="487" r="14" fill="#00E5FF"/>
    <circle cx="810" cy="487" r="14" fill="#7C3AED"/>
    <circle cx="938" cy="487" r="14" fill="#FF2E88"/>
    <circle cx="1074" cy="487" r="14" fill="#20325F" stroke="#8DA2C0"/>
    <text x="682" y="526" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#8DA2C0">title</text>
    <text x="810" y="526" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#8DA2C0">image</text>
    <text x="938" y="526" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#8DA2C0">metrics</text>
    <text x="1074" y="526" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#8DA2C0">close</text>
  </g>
  <g id="takeaway">
    <rect x="80" y="598" width="1068" height="48" rx="24" fill="#00E5FF" fill-opacity="0.10" stroke="#00E5FF" stroke-opacity="0.35"/>
    <text x="112" y="629" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#EAF2FF">验证重点：GIF 作为真实媒体进入 ppt/media；元素动画由顶层 g id 自动生成，并可在 PowerPoint 中继续调整。</text>
  </g>
  <g id="footer"><text x="1200" y="650" text-anchor="end" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#8DA2C0">03 / 05</text></g>
</svg>
