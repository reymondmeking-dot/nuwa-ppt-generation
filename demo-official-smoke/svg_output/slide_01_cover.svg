<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="55%" stop-color="#0B1026"/>
      <stop offset="100%" stop-color="#120827"/>
    </linearGradient>
    <radialGradient id="orbGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.34"/>
      <stop offset="44%" stop-color="#7C3AED" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#050816" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EAF2FF"/>
      <stop offset="54%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#FF2E88"/>
    </linearGradient>
    <filter id="softGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feFlood flood-color="#00E5FF" flood-opacity="0.42" result="glowColor"/>
      <feComposite in="glowColor" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cardShadow" x="-15%" y="-15%" width="135%" height="135%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="8" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.18" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g id="background">
    <rect width="1280" height="720" fill="url(#bgGrad)"/>
    <circle cx="930" cy="315" r="360" fill="url(#orbGlow)"/>
    <path d="M0 610 C220 520 350 650 590 565 C820 480 1010 510 1280 418" fill="none" stroke="#00E5FF" stroke-width="1.4" stroke-opacity="0.32"/>
    <path d="M0 645 C270 552 420 700 640 605 C840 518 1080 590 1280 490" fill="none" stroke="#FF2E88" stroke-width="1.2" stroke-opacity="0.22"/>
    <path d="M90 78H1190 M90 642H1190" stroke="#20325F" stroke-width="1" stroke-opacity="0.55"/>
  </g>
  <g id="hero-dynamic-image" filter="url(#cardShadow)">
    <rect x="705" y="122" width="470" height="336" rx="34" fill="#101A3F" stroke="#20325F" stroke-width="1.2"/>
    <image href="../images/dynamic_ai_orbit.gif" x="721" y="138" width="438" height="304" preserveAspectRatio="xMidYMid slice"/>
    <rect x="721" y="138" width="438" height="304" rx="24" fill="none" stroke="#00E5FF" stroke-width="1.4" stroke-opacity="0.48"/>
    <text x="940" y="485" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#8DA2C0">嵌入动态 GIF：PowerPoint 中可播放</text>
  </g>
  <g id="cover-title">
    <text x="92" y="166" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" letter-spacing="4" fill="#00E5FF">HUGOHE3 / PPT-MASTER</text>
    <text x="88" y="258" font-family="Microsoft YaHei, Arial, sans-serif" font-size="72" font-weight="700" fill="url(#titleGrad)" filter="url(#softGlow)">动态高颜值 PPT</text>
    <text x="92" y="323" font-family="Microsoft YaHei, Arial, sans-serif" font-size="38" font-weight="600" fill="#EAF2FF">SVG → Native PPTX 测试样片</text>
    <text x="94" y="378" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#8DA2C0">验证：项目结构、动态图片、页面转场、元素动画、可编辑导出</text>
  </g>
  <g id="kpi-row">
    <rect x="92" y="475" width="156" height="92" rx="22" fill="#101A3F" stroke="#20325F"/>
    <text x="124" y="515" font-family="Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="700" fill="#00E5FF">5</text>
    <text x="124" y="548" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#8DA2C0">SVG 页面</text>
    <rect x="270" y="475" width="176" height="92" rx="22" fill="#101A3F" stroke="#20325F"/>
    <text x="302" y="515" font-family="Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="700" fill="#7C3AED">GIF</text>
    <text x="302" y="548" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#8DA2C0">动态图片</text>
    <rect x="468" y="475" width="176" height="92" rx="22" fill="#101A3F" stroke="#20325F"/>
    <text x="500" y="515" font-family="Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="700" fill="#FF2E88">PPTX</text>
    <text x="500" y="548" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#8DA2C0">可编辑输出</text>
  </g>
  <g id="footer">
    <text x="92" y="652" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#8DA2C0">Generated by ppt-master skill · 2026</text>
    <text x="1188" y="652" text-anchor="end" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#8DA2C0">01 / 05</text>
  </g>
</svg>
